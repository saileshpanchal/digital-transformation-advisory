{%- comment -%}
The line we won't cross: what an agent should carry (high-volume, deterministic,
well-documented) versus what stays human-led (care, claims, vulnerable moments).
{%- endcomment -%}
<div class="diagram">
  <svg viewBox="0 0 760 230" role="img" aria-label="What to automate (high-volume, deterministic, well-documented work) versus what stays human-led (care, claims and vulnerable-customer moments), divided by the line we will not cross">
    <rect class="dg-node" x="30" y="40" width="320" height="150" rx="8"></rect>
    <text class="dg-label" x="190" y="78" text-anchor="middle">Agent carries</text>
    <text class="dg-sub" x="190" y="110" text-anchor="middle">high-volume</text>
    <text class="dg-sub" x="190" y="132" text-anchor="middle">deterministic</text>
    <text class="dg-sub" x="190" y="154" text-anchor="middle">well-documented</text>

    <line x1="380" y1="30" x2="380" y2="200" stroke="#29ABE2" stroke-width="2" stroke-dasharray="4 6"></line>
    <text class="dg-sub" x="380" y="218" text-anchor="middle" style="font-weight:700;fill:#1e8fc0;">the line we won't cross</text>

    <rect class="dg-node-accent" x="410" y="40" width="320" height="150" rx="8"></rect>
    <text class="dg-label-light" x="570" y="78" text-anchor="middle">Human-led</text>
    <text class="dg-label-light" x="570" y="110" text-anchor="middle" style="font-size:12px;font-weight:500;opacity:0.92;">care</text>
    <text class="dg-label-light" x="570" y="132" text-anchor="middle" style="font-size:12px;font-weight:500;opacity:0.92;">claims</text>
    <text class="dg-label-light" x="570" y="154" text-anchor="middle" style="font-size:12px;font-weight:500;opacity:0.92;">vulnerable moments</text>
  </svg>
</div>
