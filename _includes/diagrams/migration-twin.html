{%- comment -%}
Synthetic Bank Migration Twin: legacy to governed target, reconciled, with a
rollback path, and honest claim labels under each step.
{%- endcomment -%}
<div class="diagram">
  <svg viewBox="0 0 760 300" role="img" aria-label="Migration flow from a synthetic legacy bank, mapped to governed products, reconciled, into a governed target, with a rollback path">
    <defs>
      <marker id="dg-arrow-mt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 1 L 9 5 L 0 9 z" fill="#9bc9e6"></path>
      </marker>
    </defs>
    <line class="dg-link" x1="180" y1="115" x2="205" y2="115" marker-end="url(#dg-arrow-mt)"></line>
    <line class="dg-link" x1="365" y1="115" x2="390" y2="115" marker-end="url(#dg-arrow-mt)"></line>
    <line class="dg-link" x1="550" y1="115" x2="575" y2="115" marker-end="url(#dg-arrow-mt)"></line>

    <rect class="dg-node" x="20" y="70" width="160" height="90" rx="8"></rect>
    <text class="dg-label" x="100" y="108" text-anchor="middle">Synthetic</text>
    <text class="dg-label" x="100" y="128" text-anchor="middle">legacy bank</text>
    <text x="100" y="185" text-anchor="middle" style="font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;fill:#a66a00;">Simulated</text>

    <rect class="dg-node" x="205" y="70" width="160" height="90" rx="8"></rect>
    <text class="dg-label" x="285" y="108" text-anchor="middle">Map to governed</text>
    <text class="dg-label" x="285" y="128" text-anchor="middle">products</text>
    <text x="285" y="185" text-anchor="middle" style="font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;fill:#444;">Blueprint</text>

    <rect class="dg-node" x="390" y="70" width="160" height="90" rx="8"></rect>
    <text class="dg-label" x="470" y="108" text-anchor="middle">Reconcile</text>
    <text class="dg-label" x="470" y="128" text-anchor="middle">every outcome</text>
    <text x="470" y="185" text-anchor="middle" style="font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;fill:#444;">Blueprint</text>

    <rect class="dg-node-accent" x="575" y="70" width="160" height="90" rx="8"></rect>
    <text class="dg-label-light" x="655" y="108" text-anchor="middle">Governed</text>
    <text class="dg-label-light" x="655" y="128" text-anchor="middle">target</text>
    <text x="655" y="185" text-anchor="middle" style="font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;fill:#1857a6;">Cutover specified</text>

    <path d="M 655 200 L 655 250 L 100 250 L 100 200" fill="none" stroke="#cfe7f5" stroke-width="2" marker-end="url(#dg-arrow-mt)"></path>
    <text class="dg-sub" x="380" y="244" text-anchor="middle">Rollback: Blueprint</text>
  </svg>
</div>
