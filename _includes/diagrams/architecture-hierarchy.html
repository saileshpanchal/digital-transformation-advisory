{%- comment -%}
The DTA architecture hierarchy: Mission through Executable Systems, with the
three cross-cutting themes banded across the top. Ultim8 shown held.
{%- endcomment -%}
<div class="diagram">
  <svg viewBox="0 0 760 630" role="img" aria-label="Architecture hierarchy from Mission down to Executable Systems, with Preservation, Evolution, and Augmentation cutting across every layer">
    <defs>
      <marker id="dg-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 1 L 9 5 L 0 9 z" fill="#9bc9e6"></path>
      </marker>
    </defs>
    <!-- Three themes across the top -->
    <rect class="dg-node-soft" x="20" y="14" width="230" height="48" rx="8"></rect>
    <text class="dg-label" x="135" y="43" text-anchor="middle">Preservation</text>
    <rect class="dg-node-soft" x="265" y="14" width="230" height="48" rx="8"></rect>
    <text class="dg-label" x="380" y="43" text-anchor="middle">Evolution</text>
    <rect class="dg-node-soft" x="510" y="14" width="230" height="48" rx="8"></rect>
    <text class="dg-label" x="625" y="43" text-anchor="middle">Augmentation</text>
    <text class="dg-sub" x="380" y="83" text-anchor="middle">Three themes cut across every layer below</text>
    <!-- The hierarchy -->
    <line class="dg-link" x1="380" y1="146" x2="380" y2="166" marker-end="url(#dg-arrow)"></line>
    <line class="dg-link" x1="380" y1="212" x2="380" y2="232" marker-end="url(#dg-arrow)"></line>
    <line class="dg-link" x1="380" y1="278" x2="380" y2="298" marker-end="url(#dg-arrow)"></line>
    <line class="dg-link" x1="380" y1="344" x2="380" y2="364" marker-end="url(#dg-arrow)"></line>
    <line class="dg-link" x1="380" y1="410" x2="380" y2="430" marker-end="url(#dg-arrow)"></line>
    <line class="dg-link" x1="380" y1="476" x2="380" y2="496" marker-end="url(#dg-arrow)"></line>
    <line class="dg-link" x1="380" y1="542" x2="380" y2="562" marker-end="url(#dg-arrow)"></line>
    <rect class="dg-node-accent" x="170" y="100" width="420" height="46" rx="8"></rect>
    <text class="dg-label-light" x="380" y="128" text-anchor="middle">Mission</text>
    <rect class="dg-node" x="170" y="166" width="420" height="46" rx="8"></rect>
    <text class="dg-label" x="380" y="194" text-anchor="middle">Principles</text>
    <rect class="dg-node" x="170" y="232" width="420" height="46" rx="8"></rect>
    <text class="dg-label" x="380" y="260" text-anchor="middle">Eight Intelligences</text>
    <rect class="dg-node" x="170" y="298" width="420" height="46" rx="8"></rect>
    <text class="dg-label" x="380" y="326" text-anchor="middle">Executable Journeys</text>
    <rect class="dg-node" x="170" y="364" width="420" height="46" rx="8"></rect>
    <text class="dg-label" x="380" y="392" text-anchor="middle">Reference Architectures</text>
    <rect class="dg-node" x="170" y="430" width="420" height="46" rx="8"></rect>
    <text class="dg-label" x="380" y="458" text-anchor="middle">Prototype Specifications</text>
    <rect class="dg-node" x="170" y="496" width="420" height="46" rx="8"></rect>
    <text class="dg-label" x="380" y="524" text-anchor="middle">Reference Runtime</text>
    <text class="dg-sub" x="600" y="524">the clean-room runtime</text>
    <rect class="dg-node" x="170" y="562" width="420" height="46" rx="8"></rect>
    <text class="dg-label" x="380" y="590" text-anchor="middle">Executable Systems</text>
  </svg>
</div>
