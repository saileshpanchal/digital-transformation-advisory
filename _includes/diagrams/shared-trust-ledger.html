{%- comment -%}
The Shared Trust Ledger: the six-question loop every organisation lives in, closing
around the ledger at its centre. Same dg-* visual language as the Decisioning Loop.
Everything the organisation learns feeds one continuously updated record.
{%- endcomment -%}
<div class="diagram">
  <svg viewBox="0 0 820 470" role="img" aria-label="Six questions form a loop around the Shared Trust Ledger at the centre: what changed, what do we know, what do we believe, what should we do, what happened, and what did we learn. Everything feeds one continuously updated record.">

    <rect class="dg-node-accent" x="316" y="209" width="188" height="52" rx="9"></rect>
    <text class="dg-label-light" x="410" y="231" text-anchor="middle">Shared Trust</text>
    <text class="dg-label-light" x="410" y="251" text-anchor="middle">Ledger</text>
    <g>
      <rect class="dg-node" x="335" y="43"  width="150" height="34" rx="7"></rect><text class="dg-label" x="410" y="64"  text-anchor="middle">What changed?</text>
      <rect class="dg-node" x="487" y="131" width="150" height="34" rx="7"></rect><text class="dg-label" x="562" y="152" text-anchor="middle">What do we know?</text>
      <rect class="dg-node" x="487" y="306" width="150" height="34" rx="7"></rect><text class="dg-label" x="562" y="327" text-anchor="middle">What do we believe?</text>
      <rect class="dg-node" x="335" y="393" width="150" height="34" rx="7"></rect><text class="dg-label" x="410" y="414" text-anchor="middle">What should we do?</text>
      <rect class="dg-node" x="183" y="306" width="150" height="34" rx="7"></rect><text class="dg-label" x="258" y="327" text-anchor="middle">What happened?</text>
      <rect class="dg-node" x="183" y="131" width="150" height="34" rx="7"></rect><text class="dg-label" x="258" y="152" text-anchor="middle">What did we learn?</text>
    </g>
  </svg>
</div>
