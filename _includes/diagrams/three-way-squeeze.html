<svg viewBox="0 0 320 300" role="img" aria-labelledby="sqt sqd" xmlns="http://www.w3.org/2000/svg">
  <title id="sqt">The three-way squeeze on the core</title>
  <desc id="sqd">Intelligence presses down from above, tokenised money presses up from below, and the ledger commoditises in the middle.</desc>
  <defs>
    <marker id="ad" markerWidth="9" markerHeight="9" refX="4.5" refY="7" orient="auto"><path d="M1,1 L4.5,7 L8,1" fill="none" stroke="#76d2f5" stroke-width="1.6"/></marker>
    <marker id="au" markerWidth="9" markerHeight="9" refX="4.5" refY="2" orient="auto"><path d="M1,8 L4.5,2 L8,8" fill="none" stroke="#76d2f5" stroke-width="1.6"/></marker>
  </defs>
  <rect x="14" y="14" width="292" height="64" rx="7" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.2"/>
  <text x="30" y="42" fill="#fff" font-family="Montserrat,sans-serif" font-size="14" font-weight="800">Intelligence</text>
  <text x="30" y="62" fill="rgba(255,255,255,.62)" font-family="Montserrat,sans-serif" font-size="10.5">rises above the ledger</text>
  <line x1="80" y1="84" x2="80" y2="108" stroke="#76d2f5" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="240" y1="84" x2="240" y2="108" stroke="#76d2f5" stroke-width="1.5" marker-end="url(#ad)"/>
  <rect x="14" y="116" width="292" height="60" rx="7" fill="#29abe2" opacity=".16"/>
  <rect x="14" y="116" width="292" height="60" rx="7" fill="none" stroke="#29abe2" stroke-width="1.5"/>
  <text x="30" y="142" fill="#fff" font-family="Montserrat,sans-serif" font-size="14" font-weight="800">The ledger</text>
  <text x="30" y="162" fill="rgba(255,255,255,.78)" font-family="Montserrat,sans-serif" font-size="10.5">commoditises &mdash; regulated plumbing</text>
  <line x1="80" y1="184" x2="80" y2="208" stroke="#76d2f5" stroke-width="1.5" marker-end="url(#au)"/>
  <line x1="240" y1="184" x2="240" y2="208" stroke="#76d2f5" stroke-width="1.5" marker-end="url(#au)"/>
  <rect x="14" y="216" width="292" height="64" rx="7" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.2"/>
  <text x="30" y="244" fill="#fff" font-family="Montserrat,sans-serif" font-size="14" font-weight="800">Tokenised money</text>
  <text x="30" y="264" fill="rgba(255,255,255,.62)" font-family="Montserrat,sans-serif" font-size="10.5">forms beneath</text>
</svg>
