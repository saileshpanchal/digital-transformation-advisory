{%- comment -%}
Why AI projects stall: a pilot only reaches production by clearing three gates —
consistent, inspectable, bounded. The three answers to inconsistent outputs,
ungovernable black boxes, and unpredictable failure.
{%- endcomment -%}
<div class="diagram">
  <svg viewBox="0 0 820 210" role="img" aria-label="A pilot reaches production only by clearing three gates: consistent (same result every time), inspectable (audited 100 percent), and bounded (human-gated and recoverable)">
    <defs>
      <marker id="dg-arrow-gates" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 1 L 9 5 L 0 9 z" fill="#9bc9e6"></path>
      </marker>
    </defs>

    <rect class="dg-node-soft" x="10" y="62" width="100" height="86" rx="8"></rect>
    <text class="dg-label" x="60" y="100" text-anchor="middle">Pilot</text>
    <text class="dg-sub" x="60" y="122" text-anchor="middle">won't ship</text>

    <line class="dg-link" x1="110" y1="105" x2="138" y2="105" marker-end="url(#dg-arrow-gates)"></line>

    <text class="dg-sub" x="375" y="34" text-anchor="middle" style="font-weight:700;">Three gates to production</text>
    <rect class="dg-node" x="140" y="48" width="150" height="118" rx="8"></rect>
    <text class="dg-label" x="215" y="98" text-anchor="middle">Consistent</text>
    <text class="dg-sub" x="215" y="122" text-anchor="middle">C3 Context:</text>
    <text class="dg-sub" x="215" y="138" text-anchor="middle">the governed spec</text>

    <rect class="dg-node" x="300" y="48" width="150" height="118" rx="8"></rect>
    <text class="dg-label" x="375" y="98" text-anchor="middle">Inspectable</text>
    <text class="dg-sub" x="375" y="122" text-anchor="middle">C3 Consent:</text>
    <text class="dg-sub" x="375" y="138" text-anchor="middle">audited 100%</text>

    <rect class="dg-node" x="460" y="48" width="150" height="118" rx="8"></rect>
    <text class="dg-label" x="535" y="98" text-anchor="middle">Bounded</text>
    <text class="dg-sub" x="535" y="122" text-anchor="middle">C3 Consent:</text>
    <text class="dg-sub" x="535" y="138" text-anchor="middle">human-gated</text>

    <line class="dg-link" x1="610" y1="105" x2="638" y2="105" marker-end="url(#dg-arrow-gates)"></line>

    <rect class="dg-node-accent" x="640" y="62" width="170" height="86" rx="8"></rect>
    <text class="dg-label-light" x="725" y="100" text-anchor="middle">Production</text>
    <text class="dg-label-light" x="725" y="122" text-anchor="middle" style="font-size:12px;font-weight:500;opacity:0.92;">you can answer for</text>
  </svg>
</div>
