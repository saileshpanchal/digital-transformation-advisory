{%- comment -%}
The hidden problem: everyone invests in the technology layer; transformation is
won or lost in the organisation layer beneath it.
{%- endcomment -%}
<div class="diagram">
  <svg viewBox="0 0 620 384" role="img" aria-label="Two layers. The technology layer (Cloud, AI, Data, Payments, Security) is where organisations invest. Beneath it, the organisation layer (Knowledge, Decisions, Capabilities, Architecture, Governance, Culture, Execution) is where transformation is actually won or lost.">
    <!-- Technology band -->
    <rect x="30" y="44" width="560" height="118" rx="10" fill="#eef7fc" stroke="#cfe0ef"/>
    <text x="50" y="74" fill="#0877a6" font-size="13" font-weight="800" letter-spacing="1.5">TECHNOLOGY</text>
    <text x="50" y="92" fill="#5d6871" font-size="11">Where the investment goes. Funded, visible, mastered.</text>
    <g font-size="11" text-anchor="middle" font-weight="600">
      <rect x="48"  y="112" width="96" height="34" rx="6" fill="#fff" stroke="#cfe0ef"/><text x="96"  y="133" fill="#161616">Cloud</text>
      <rect x="156" y="112" width="96" height="34" rx="6" fill="#fff" stroke="#cfe0ef"/><text x="204" y="133" fill="#161616">AI</text>
      <rect x="264" y="112" width="96" height="34" rx="6" fill="#fff" stroke="#cfe0ef"/><text x="312" y="133" fill="#161616">Data</text>
      <rect x="372" y="112" width="96" height="34" rx="6" fill="#fff" stroke="#cfe0ef"/><text x="420" y="133" fill="#161616">Payments</text>
      <rect x="480" y="112" width="96" height="34" rx="6" fill="#fff" stroke="#cfe0ef"/><text x="528" y="133" fill="#161616">Security</text>
    </g>
    <!-- the line -->
    <line x1="30" y1="180" x2="590" y2="180" stroke="#c7ced6" stroke-width="1.5" stroke-dasharray="5 5"/>
    <text x="310" y="176" fill="#8a6317" font-size="11" font-weight="700" text-anchor="middle">the line most transformations never cross</text>
    <!-- Organisation band -->
    <rect x="30" y="196" width="560" height="160" rx="10" fill="#0e2b45"/>
    <text x="50" y="226" fill="#ffffff" font-size="13" font-weight="800" letter-spacing="1.5">ORGANISATION</text>
    <text x="50" y="244" fill="#9fc7e0" font-size="11">Where transformation is won or lost. Unmeasured.</text>
    <g font-size="11" text-anchor="middle" font-weight="600" fill="#ffffff">
      <rect x="48"  y="258" width="120" height="32" rx="6" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.28)"/><text x="108" y="279">Knowledge</text>
      <rect x="181" y="258" width="120" height="32" rx="6" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.28)"/><text x="241" y="279">Decisions</text>
      <rect x="314" y="258" width="120" height="32" rx="6" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.28)"/><text x="374" y="279">Capabilities</text>
      <rect x="447" y="258" width="120" height="32" rx="6" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.28)"/><text x="507" y="279">Architecture</text>
      <rect x="48"  y="300" width="120" height="32" rx="6" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.28)"/><text x="108" y="321">Governance</text>
      <rect x="181" y="300" width="120" height="32" rx="6" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.28)"/><text x="241" y="321">Culture</text>
      <rect x="314" y="300" width="120" height="32" rx="6" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.28)"/><text x="374" y="321">Execution</text>
    </g>
  </svg>
</div>
