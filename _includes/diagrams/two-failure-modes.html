{%- comment -%}
Leave no customer behind = one mission, two failure modes. Left behind
(excluded / harmed) and left on the table (under-served / value missed),
both held by outcomes designed in.
{%- endcomment -%}
<div class="diagram">
  <svg viewBox="0 0 760 250" role="img" aria-label="One mission with two failure modes: leaving customers behind through exclusion or harm, and leaving them on the table through under-service and missed value, both addressed by designing outcomes in">
    <rect class="dg-node" x="30" y="50" width="300" height="110" rx="8"></rect>
    <text class="dg-label" x="180" y="88" text-anchor="middle">Left behind</text>
    <text class="dg-sub" x="180" y="116" text-anchor="middle">excluded &middot; harmed</text>
    <text class="dg-sub" x="180" y="136" text-anchor="middle">(protect)</text>

    <rect class="dg-node" x="430" y="50" width="300" height="110" rx="8"></rect>
    <text class="dg-label" x="580" y="88" text-anchor="middle">Left on the table</text>
    <text class="dg-sub" x="580" y="116" text-anchor="middle">under-served &middot; value missed</text>
    <text class="dg-sub" x="580" y="136" text-anchor="middle">(grow)</text>

    <line class="dg-link" x1="330" y1="105" x2="430" y2="105"></line>

    <rect class="dg-node-accent" x="250" y="190" width="260" height="44" rx="22"></rect>
    <text class="dg-label-light" x="380" y="217" text-anchor="middle">Outcomes, by design</text>
    <line class="dg-link" x1="180" y1="160" x2="330" y2="190"></line>
    <line class="dg-link" x1="580" y1="160" x2="430" y2="190"></line>
  </svg>
</div>
