title: Digital Transformation Advisory
description: >-
  DTA is a strategic advisory helping banks build the future of finance without
  leaving the customer behind: evolving customers, colleagues and technology
  together through multiple forms of intelligence into trustworthy, inclusive
  and resilient financial systems.
url: "https://digital-transformation-advisory.com"
baseurl: ""
author: Sailesh Panchal

# Social links — used in the post author bio and footer. Leave blank to hide.
linkedin: ""
medium: ""

permalink: /:year/:month/:day/:title/
timezone: Europe/London

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

paginate: 10
paginate_path: "/page/:num/"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - LICENSE
  - tools
  - .claude
  - CLAUDE.md
  - AGENTS.md
  - netlify.toml
  - assets/diagrams/src
  - assets/diagrams/render.sh
  - docs
  - .superpowers
  - .gstack
  - scripts
  - perf
  - podcast
  - categories.md
  - tags.md
  - search.md
  - search.json

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "corporate-post"
  - scope:
      path: ""
    values:
      layout: "corporate"
