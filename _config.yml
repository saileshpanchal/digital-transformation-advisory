title: Digital Transformation Advisory
description: >-
  Technology strategy, Apple platform engineering, AI-native architecture,
  and the people shaping our digital future.
url: "https://dta-advisory.netlify.app"  # Update to custom domain when ready
baseurl: ""
author: Sailesh Panchal

permalink: /:year/:month/:day/:title/
timezone: Europe/London

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

paginate: 10
paginate_path: "/page/:num/"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - LICENSE
  - tools
  - .claude
  - CLAUDE.md
  - netlify.toml
  - assets/diagrams/src
  - assets/diagrams/render.sh

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

