title: Digital Transformation Advisory
description: >-
  Transforming Organisations to work for you. Specialising in Agile/SaFE,
  Strategic Architecture and ISO 20022 Payments.
url: "https://digital-transformation-advisory.com"
baseurl: ""
author: Sailesh Panchal

permalink: /:year/:month/:day/:title/
timezone: Europe/London

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

paginate: 10
paginate_path: "/page/:num/"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - LICENSE
  - tools
  - .claude
  - CLAUDE.md
  - AGENTS.md
  - netlify.toml
  - assets/diagrams/src
  - assets/diagrams/render.sh
  - docs
  - podcast
  - about.md
  - categories.md
  - tags.md
  - search.md
  - search.json

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "corporate-post"
  - scope:
      path: ""
    values:
      layout: "corporate"
