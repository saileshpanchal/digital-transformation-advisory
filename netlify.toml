[build]
  command = "bundle install && bundle exec jekyll build && ./scripts/check-public-showcase.sh"
  publish = "_site"

[build.environment]
  RUBY_VERSION = "3.3.6"
  JEKYLL_ENV = "production"

[[redirects]]
  from = "/sfia"
  to = "/capability-intelligence/"
  status = 301

[[redirects]]
  from = "/sfia/"
  to = "/capability-intelligence/"
  status = 301

[[redirects]]
  from = "/customer-outcomes"
  to = "/consumer-outcomes/"
  status = 301
  force = true

[[redirects]]
  from = "/customer-outcomes/"
  to = "/consumer-outcomes/"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
