" x="404.833" y="681.6074"/><text fill="#1A1A1A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="64.7158" x="411.833" y="702.1426">Qwen 3.5</text><text fill="#1A1A1A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="41.3164" x="423.5327" y="718.6309">Model</text></g><rect fill="#E8F4FF" height="3" rx="4" ry="4" style="stroke:#E8F4FF;stroke-width:1;" width="636.0972" x="0" y="121.1201"/><line style="stroke:#0096FF;stroke-width:1;" x1="0" x2="636.0972" y1="121.1201" y2="121.1201"/><line style="stroke:#0096FF;stroke-width:1;" x1="0" x2="636.0972" y1="124.1201" y2="124.1201"/><rect fill="#E8F4FF" height="23.3105" rx="4" ry="4" style="stroke:#0096FF;stroke-width:2;" width="193.8735" x="221.1118" y="110.4648"/><text fill="#1A1A1A" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="175.5889" x="227.1118" y="127.0332">Wrong: Raw Prompt String</text><g class="message" data-entity-1="part1" data-entity-2="part3" id="msg1"><polygon fill="#1A1A1A" points="432.1909,161.0859,442.1909,165.0859,432.1909,169.0859,436.1909,165.0859" style="stroke:#1A1A1A;stroke-width:1;"/><line style="stroke:#1A1A1A;stroke-width:1.5;" x1="47.5332" x2="438.1909" y1="165.0859" y2="165.0859"/><text fill="#AAAAAA" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.8535" x="54.5332" y="160.3438">prompt = "Describe a tavern..."</text></g><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg2"><line style="stroke:#1A1A1A;stroke-width:1.5;" x1="444.1909" x2="486.1909" y1="209.707" y2="209.707"/><line style="stroke:#1A1A1A;stroke-width:1.5;" x1="486.1909" x2="486.1909" y1="209.707" y2="222.707"/><line style="stroke:#1A1A1A;stroke-width:1.5;" x1="445.1909" x2="486.1909" y1="222.707" y2="222.707"/><polygon fill="#1A1A1A" points="455.1909,218.707,445.1909,222.707,455.1909,226.707,451.1909,222.707" style="stroke:#1A1A1A;stroke-width:1;"/><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="95.3037" x="451.1909" y="189.6543">Thinking mode</text><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.7056" x="451.1909" y="204.9648">triggers unpredictably</text></g><g class="message" data-entity-1="part3" data-entity-2="part1" id="msg3"><polygon fill="#1A1A1A" points="58.5332,263.3281,48.5332,267.3281,58.5332,271.3281,54.5332,267.3281" style="stroke:#1A1A1A;stroke-width:1;"/><line style="stroke:#1A1A1A;stroke-width:1.5;" x1="52.5332" x2="443.1909" y1="267.3281" y2="267.3281"/><text fill="#AAAAAA" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.7412" x="64.5332" y="247.2754">&lt;think&gt;1. Analyze... 2. Brainstorm...&lt;/think&gt;</text><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.1021" x="64.5332" y="262.5859">(reasoning dump, not prose)</text></g><path d="M449,284.3281 L449,331.3281 A4,4 0 0 0 453,335.3281 L627,335.3281 A4,4 0 0 0 631,331.3281 L631,290.3281 L621,280.3281 L453,280.3281 A4,4 0 0 0 449,284.3281" fill="#E8F4FF" style="stroke:#0096FF;stroke-width:0.5;"/><path d="M621,280.3281 L621,288.3281 A2,2 0 0 0 623,290.3281 L631,290.3281 L621,280.3281" fill="#E8F4FF" style="stroke:#0096FF;stroke-width:0.5;"/><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144.8853" x="455" y="297.8965">Raw strings bypass the</text><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161.0972" x="455" y="313.207">model's expected format.</text><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.5688" x="455" y="328.5176">Output is unpredictable.</text><rect fill="#E8F4FF" height="3" rx="4" ry="4" style="stroke:#E8F4FF;stroke-width:1;" width="636.0972" x="0" y="361.915"/><line style="stroke:#0096FF;stroke-width:1;" x1="0" x2="636.0972" y1="361.915" y2="361.915"/><line style="stroke:#0096FF;stroke-width:1;" x1="0" x2="636.0972" y1="364.915" y2="364.915"/><rect fill="#E8F4FF" height="23.3105" rx="4" ry="4" style="stroke:#0096FF;stroke-width:2;" width="172.5264" x="231.7854" y="351.2598"/><text fill="#1A1A1A" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="154.2417" x="237.7854" y="367.8281">Correct: Chat Template</text><g class="message" data-entity-1="part1" data-entity-2="part2" id="msg4"><polygon fill="#1A1A1A" points="217.082,432.502,227.082,436.502,217.082,440.502,221.082,436.502" style="stroke:#1A1A1A;stroke-width:1;"/><line style="stroke:#1A1A1A;stroke-width:1.5;" x1="47.5332" x2="223.082" y1="436.502" y2="436.502"/><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.5547" x="54.5332" y="401.1387">apply_chat_template(</text><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="97.0303" x="62.7598" y="416.4492">messages=[...],</text><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="110.792" x="62.7598" y="431.7598">enable_thinking=</text><text fill="#1A1A1A" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="34.3027" x="173.5518" y="431.7598">False</text><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.2275" x="207.8545" y="431.7598">)</text></g><g class="message" data-entity-1="part2" data-entity-2="part2" id="msg5"><line style="stroke:#1A1A1A;stroke-width:1.5;" x1="229.082" x2="271.082" y1="481.123" y2="481.123"/><line style="stroke:#1A1A1A;stroke-width:1.5;" x1="271.082" x2="271.082" y1="481.123" y2="494.123"/><line style="stroke:#1A1A1A;stroke-width:1.5;" x1="230.082" x2="271.082" y1="494.123" y2="494.123"/><polygon fill="#1A1A1A" points="240.082,490.123,230.082,494.123,240.082,498.123,236.082,494.123" style="stroke:#1A1A1A;stroke-width:1;"/><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="122.7891" x="236.082" y="461.0703">Format with special</text><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="156.0127" x="236.082" y="476.3809">tokens + system prompt</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg6"><polygon fill="#1A1A1A" points="432.1909,534.7441,442.1909,538.7441,432.1909,542.7441,436.1909,538.7441" style="stroke:#1A1A1A;stroke-width:1;"/><line style="stroke:#1A1A1A;stroke-width:1.5;" x1="229.082" x2="438.1909" y1="538.7441" y2="538.7441"/><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.4473" x="236.082" y="518.6914">Properly formatted</text><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.1089" x="236.082" y="534.002">prompt with thinking disabled</text></g><g class="message" data-entity-1="part3" data-entity-2="part1" id="msg7"><polygon fill="#1A1A1A" points="58.5332,594.6758,48.5332,598.6758,58.5332,602.6758,54.5332,598.6758" style="stroke:#1A1A1A;stroke-width:1;"/><line style="stroke:#1A1A1A;stroke-width:1.5;" x1="52.5332" x2="443.1909" y1="598.6758" y2="598.6758"/><text fill="#0096FF" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="152.4771" x="64.5332" y="563.3125">"The heavy oak doors of</text><text fill="#0096FF" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217.5786" x="64.5332" y="578.623">The Gilded Tankard groan open..."</text><text fill="#1A1A1A" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="113.1343" x="64.5332" y="593.9336">(structured prose)</text></g><path d="M234,615.6758 L234,662.6758 A4,4 0 0 0 238,666.6758 L412,666.6758 A4,4 0 0 0 416,662.6758 L416,621.6758 L406,611.6758 L238,611.6758 A4,4 0 0 0 234,615.6758" fill="#E8F4FF" style="stroke:#0096FF;stroke-widt